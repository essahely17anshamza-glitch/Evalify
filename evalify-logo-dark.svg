<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="800" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
      .logo-text {
        font-family: 'Space Grotesk', -apple-system, sans-serif;
        font-weight: 700;
        font-size: 52px;
        fill: #FFFFFF;
        letter-spacing: -1.5px;
      }
      .logo-bg {
        fill: #0A0A0A;
      }
    </style>
  </defs>
  
  <!-- Dark Background -->
  <rect width="100%" height="100%" rx="16" class="logo-bg" />
  
  <!-- Text -->
  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" class="logo-text">
    &lt;Evalify/&gt;
  </text>
</svg>
